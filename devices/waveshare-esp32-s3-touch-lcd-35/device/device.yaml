# =============================================================================
# DEVICE - Waveshare ESP32-S3-Touch-LCD-3.5 hardware definition
# =============================================================================
# Pin assignments, peripherals, and platform config for the 3.5" portrait panel.
# Includes the ESP32-S3 SoC (native WiFi), ST7796 MIPI SPI display, FT63x6
# capacitive touchscreen via I2C, PCA9554 GPIO expander for display CS/reset,
# and backlight PWM via LEDC.
# =============================================================================

substitutions:
  espcontrol_component_url: "https://github.com/Heinekamp/espcontrol"
  espcontrol_component_ref: "main"

# ---------------------------------------------------------------------------
# ESP32-S3 platform (16MB flash, ESP-IDF framework)
# ---------------------------------------------------------------------------
esp32:
  board: esp32-s3-devkitc-1
  flash_size: 16MB
  framework:
    type: esp-idf
    sdkconfig_options:
      CONFIG_MBEDTLS_EXTERNAL_MEM_ALLOC: "y"
      CONFIG_ESP_TASK_WDT_TIMEOUT_S: "30"
      CONFIG_ESP_WIFI_STATIC_RX_BUFFER_NUM: "8"
      CONFIG_ESP_WIFI_DYNAMIC_TX_BUFFER: "y"
      CONFIG_SPIRAM_TRY_ALLOCATE_WIFI_LWIP: "y"

# ---------------------------------------------------------------------------
# External component
# ---------------------------------------------------------------------------
external_components:
  - source:
      type: git
      url: ${espcontrol_component_url}
      ref: ${espcontrol_component_ref}
      path: components
    components: [espcontrol, web_server_idf, artwork_image]
    refresh: 1s

espcontrol:

# ---------------------------------------------------------------------------
# ESPHome core
# ---------------------------------------------------------------------------
esphome:
  name: ${name}
  friendly_name: ${friendly_name}
  platformio_options:
    build_flags:
      - "-DESPCONTROL_DISABLE_TODO=1"
      - "-DESPCONTROL_MAX_GRID_SLOTS=6"
      - "-DUSE_ESP_IDF"
      - "-include esp_wifi.h"
    build_src_flags:
      - "-mtext-section-literals"
  on_boot:
    - priority: 800
      then:
        - lambda: |-
            auto reason = esp_reset_reason();
            if (reason == ESP_RST_SW) {
              esp_ota_img_states_t ota_state;
              const esp_partition_t *running = esp_ota_get_running_partition();
              if (running != nullptr &&
                  esp_ota_get_state_partition(running, &ota_state) == ESP_OK &&
                  ota_state == ESP_OTA_IMG_PENDING_VERIFY) {
                ESP_LOGI("s3_reset", "Marking OTA image valid before hardware-reset workaround");
                id(waveshare_35_safe_mode).mark_successful();
                global_preferences->sync();
                esp_sleep_enable_timer_wakeup(100000);
                esp_deep_sleep_start();
                return;
              }
            }
            if (reason == ESP_RST_USB || reason == ESP_RST_SW) {
              esp_sleep_enable_timer_wakeup(100000);
              esp_deep_sleep_start();
            }
    - priority: -100
      then:
        - lambda: 'id(screen_rotation_ready) = true;'
        - script.execute: apply_screen_rotation
        - script.execute: clock_bar_apply

# ---------------------------------------------------------------------------
# PSRAM (frame buffer memory)
# ---------------------------------------------------------------------------
psram:
  mode: octal
  speed: 80MHz

# ---------------------------------------------------------------------------
# OTA updates
# ---------------------------------------------------------------------------
ota:
  - platform: esphome
    on_begin:
      then:
        - script.execute: show_update_writing
        - script.wait: show_update_writing
    on_end:
      then:
        - globals.set:
            id: firmware_update_complete_pending
            value: 'true'
        - lambda: 'global_preferences->sync();'
        - lambda: |-
            esp_sleep_enable_timer_wakeup(100000);
            esp_deep_sleep_start();
    on_error:
      then:
        - script.execute: show_update_failed
  - platform: http_request
    on_begin:
      then:
        - script.execute: show_update_writing
        - script.wait: show_update_writing
    on_end:
      then:
        - globals.set:
            id: firmware_update_complete_pending
            value: 'true'
        - lambda: 'global_preferences->sync();'
        - lambda: |-
            esp_sleep_enable_timer_wakeup(100000);
            esp_deep_sleep_start();
    on_error:
      then:
        - script.execute: show_update_failed

safe_mode:
  id: waveshare_35_safe_mode
  boot_is_good_after: 10s

# ---------------------------------------------------------------------------
# Shared infrastructure (API, logging, web server, restart button)
# ---------------------------------------------------------------------------
packages:
  core_infra: !include ../../../common/device/core_infra.yaml

api:
  listen_backlog: 4
  max_connections: 3
  max_send_queue: 12

logger:
  hardware_uart: UART0

wifi:
  power_save_mode: HIGH
  use_psram: true

# ---------------------------------------------------------------------------
# I2C bus — shared by PCA9554 GPIO expander and FT63x6 touch controller
# ---------------------------------------------------------------------------
i2c:
  - id: i2c_bus
    sda: GPIO08
    scl: GPIO07
    scan: true

# ---------------------------------------------------------------------------
# PCA9554 GPIO expander — controls display CS (pin 2) and reset (pin 1)
# ---------------------------------------------------------------------------
pca9554:
  - id: pca9554_hub
    address: 0x20
    i2c_id: i2c_bus

# ---------------------------------------------------------------------------
# Backlight (LEDC PWM — GPIO06, channel 0)
# ---------------------------------------------------------------------------
output:
  - platform: ledc
    pin: GPIO06
    id: gpio_backlight_pwm
    frequency: 2000Hz
    min_power: 0.01
    zero_means_zero: true

light:
  - platform: monochromatic
    output: gpio_backlight_pwm
    name: Display Backlight
    icon: mdi:lightbulb-on
    id: display_backlight
    restore_mode: RESTORE_DEFAULT_ON
    default_transition_length: 0s
    gamma_correct: 1.0
    on_turn_on:
      then:
        - if:
            condition:
              lambda: |-
                auto now = panel_time_or_fallback(id(panel_time).now(), id(homeassistant_time).now());
                return (id(screen_schedule_asleep) &&
                        !id(schedule_mode_clock)) ||
                       screen_schedule_waiting_for_time(
                         id(screen_schedule_trigger).state,
                         id(schedule_enabled).state,
                         now.is_valid());
            then:
              - script.execute: backlight_force_display_off
            else:
              - if:
                  condition:
                    lambda: 'return id(screensaver_display_off_active);'
                  then:
                    - lambda: |-
                        esp_wifi_set_ps(WIFI_PS_MIN_MODEM);
                    - delay: 500ms
                    - script.execute: screensaver_wake
    on_turn_off:
      then:
        - if:
            condition:
              lambda: |-
                return !id(display_asleep) &&
                       !id(screen_schedule_asleep) &&
                       !id(screensaver_display_off_active) &&
                       !id(screensaver_dimmed_active);
            then:
              - script.execute: screen_schedule_manual_sleep
        - if:
            condition:
              lambda: 'return id(screensaver_display_off_active);'
            then:
              - delay: 500ms
              - lambda: |-
                  esp_wifi_set_ps(WIFI_PS_MAX_MODEM);
# ---------------------------------------------------------------------------
# SPI bus — ST7796 display
# ---------------------------------------------------------------------------
spi:
  id: display_spi
  clk_pin: GPIO05
  mosi_pin: GPIO01
  miso_pin: GPIO02

# ---------------------------------------------------------------------------
# Display — ST7796 3.5" 320x480 portrait via mipi_spi
# ---------------------------------------------------------------------------
display:
  - platform: mipi_spi
    model: st7796
    id: my_display
    spi_id: display_spi
    cs_pin:
      pca9554: pca9554_hub
      number: 2
    dc_pin: GPIO03
    reset_pin:
      pca9554: pca9554_hub
      number: 1
    spi_mode: 1
    color_order: bgr
    invert_colors: true
    pixel_mode: 16bit
    auto_clear_enabled: false
    update_interval: never
    dimensions:
      width: 320
      height: 480
    setup_priority: 240

# ---------------------------------------------------------------------------
# Touchscreen — FT63x6 capacitive, portrait orientation
# ---------------------------------------------------------------------------
touchscreen:
  - platform: ft63x6
    id: my_touchscreen
    display: my_display
    transform:
      swap_xy: false
      mirror_x: false
      mirror_y: false
    on_touch:
      - script.execute: screensaver_wake

# ---------------------------------------------------------------------------
# LVGL base
# ---------------------------------------------------------------------------
lvgl:
  id: main_lvgl
  setup_priority: 230
  buffer_size: 12%
  displays: my_display
  rotation: 0
  touchscreens:
    - touchscreen_id: my_touchscreen
      long_press_time: 3s

# ---------------------------------------------------------------------------
# Scripts
# ---------------------------------------------------------------------------
script:
  - id: apply_screen_rotation
    then:
      - if:
          condition:
            lambda: 'return id(screen_rotation_select).current_option() == "90";'
          then:
            - lvgl.display.set_rotation: 90
          else:
            - if:
                condition:
                  lambda: 'return id(screen_rotation_select).current_option() == "180";'
                then:
                  - lvgl.display.set_rotation: 180
                else:
                  - if:
                      condition:
                        lambda: 'return id(screen_rotation_select).current_option() == "270";'
                      then:
                        - lvgl.display.set_rotation: 270
                      else:
                        - lvgl.display.set_rotation: 0

select:
  - platform: template
    name: "${entity_screen_rotation}"
    internal: true
    disabled_by_default: true
    id: screen_rotation_select
    entity_category: config
    icon: "mdi:screen-rotation"
    optimistic: true
    restore_value: true
    initial_option: "0"
    options:
      - "0"
      - "90"
      - "180"
      - "270"
    on_value:
      then:
        - if:
            condition:
              lambda: 'return id(screen_rotation_ready);'
            then:
              - script.execute: apply_screen_rotation
              - script.execute: clock_bar_apply

