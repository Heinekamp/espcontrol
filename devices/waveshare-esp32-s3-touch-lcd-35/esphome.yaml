# =============================================================================
# ESPHOME ENTRY POINT - Waveshare ESP32-S3-Touch-LCD-3.5
# =============================================================================
# User-facing config. Set your device name and WiFi credentials here.
# The remote package pulls the full device configuration from your fork.
# =============================================================================

substitutions:
  name: "your-device-name"
  friendly_name: "Your Device Name"

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

packages:
  setup:
    url: https://github.com/Heinekamp/espcontrol/
    file: devices/waveshare-esp32-s3-touch-lcd-35/packages.yaml
    refresh: 1s
